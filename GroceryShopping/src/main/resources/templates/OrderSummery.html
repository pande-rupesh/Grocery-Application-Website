<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Order Summary</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container mt-4">

		<h2 class="text-center mb-4">📦 Order Summary</h2>

		<div class="row">

			<!-- LEFT SIDE: ADDRESS FORM -->
			<div class="col-md-7">
				<div class="card shadow-sm mb-4">
					<div class="card-header bg-primary text-white">
						<h5 class="mb-0">Shipping Address</h5>
					</div>

					<div class="card-body">

						<form th:action="@{/place-order}" method="post">

							<!-- Hidden User ID -->
							<input type="hidden" name="uid" th:value="${uid}" />

							<div class="mb-3">
								<label class="form-label">Full Name</label> <input type="text"
									name="name" class="form-control" th:value="${user.name}"
									placeholder="Enter full name" required>
							</div>

							<div class="mb-3">
								<label class="form-label">Mobile Number</label> <input
									type="text" name="mobile" class="form-control"
									th:value="${user.mobile}" placeholder="Enter mobile number"
									required>
							</div>

							<div class="mb-3">
								<label class="form-label">Email</label> <input type="email"
									name="email" class="form-control" th:value="${user.email}"
									placeholder="Enter Email" required>
							</div>

							<div class="mb-3">
								<label class="form-label">Full Address</label>
								<textarea name="street" class="form-control" rows="3"
									th:text="${user.address != null ? user.address.street : ''}"
									placeholder="House No, Street, Area" required></textarea>
							</div>

							<div class="row">
								<div class="col-md-6 mb-3">
									<label class="form-label">City</label> <input type="text"
										name="city" class="form-control"
										th:value="${user.address != null ? user.address.city : ''}"
										required>

								</div>

								<div class="col-md-6 mb-3">
									<label class="form-label">Pincode</label> <input type="text"
										name="pincode" class="form-control"
										th:value="${user.address != null ? user.address.zip : ''}"
										required>
								</div>
							</div>
					</div>
					<!-- card-body -->
				</div>
			</div>

			<!-- RIGHT SIDE: ORDER DETAILS -->
			<div class="col-md-5">

				<div class="card shadow-sm mb-4">
					<div class="card-header bg-success text-white">
						<h5 class="mb-0">Order Details</h5>
					</div>

					<div class="card-body">

						<p class="d-flex justify-content-between">
							<strong>Total Items:</strong> <span th:text="${totalItem}">0</span>
						</p>

						<p class="d-flex justify-content-between">
							<strong>Total Amount:</strong> <span
								th:text="'₹' + ${totalPrice}">₹0</span>
						</p>

						<hr>

						<h6 class="mb-3">Payment Method</h6>

						<div class="form-check">
							<input class="form-check-input" type="radio" name="paymentType"
								value="COD" checked> <label class="form-check-label">Cash
								on Delivery (COD)</label>
						</div>

						<div class="form-check mt-2">
							<input class="form-check-input" type="radio" name="paymentType"
								value="ONLINE"> <label class="form-check-label">Online
								Payment</label>
						</div>

						<hr>
						<!-- BUTTON ROW -->
						<div class="row g-2">
							<!-- EDIT ORDER BUTTON -->
							<div class="col-6">
								<a th:href="@{'/cart/' + ${uid}}"
									class="btn btn-outline-primary w-100 btn-lg"> Edit Order </a>
							</div>

							<!-- CONFIRM ORDER BUTTON -->
							<div class="col-6">

								<button type="submit"
									th:formaction="@{'/confromorder/' + ${uid}}"
									class="btn btn-outline-primary w-100 btn-lg">Confirm
									Order</button>
								 
							</div>
						</div>

						</form>

					</div>
				</div>

			</div>
			<!-- right side end -->

		</div>

	</div>

</body>
</html>
