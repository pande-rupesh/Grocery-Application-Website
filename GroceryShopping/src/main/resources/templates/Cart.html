<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Your Cart</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container mt-4">
		<h2 class="text-center mb-4">🛒 Your Cart</h2>
		<div id="msg-box" th:if="${msg}" th:text="${msg}"
			style="color: green; font-size: 18px; font-weight: bold;"></div>

		<!-- If Cart is Empty -->
		<div th:if="${#lists.isEmpty(cartList)}" class="text-center">
			<h4>Your cart is empty</h4>
			<a href="/" class="btn btn-primary mt-3">Continue Shopping</a>
		</div>

		<!-- Cart Table -->
		<div th:if="${!#lists.isEmpty(cartList)}" class="row">

			<div class="col-md-8">
				<table class="table table-bordered bg-white rounded shadow">
					<thead class="table-success">
						<tr>
							<th>Product</th>
							<th>Name</th>
							<th>Price</th>
							<th>Qty</th>
							<th>Total</th>
							<th>Action</th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="c : ${cartList}">
							<td><img th:src="@{'/img/product/' + ${c.product.Image}}"
								style="height: 70px; width: 70px; border-radius: 5px;"></td>

							<td th:text="${c.product.product_name}"></td>

							<td>₹<span th:text="${c.product.price}"></span></td>

							<!-- Quantity Increase/Decrease -->
							<td>
								<div class="d-flex align-items-center">

									<!-- Decrease Quantity -->
									<a
										th:href="@{/cart/dec(pid=${c.product.id}, uid=${c.user.id})}"
										class="btn btn-sm btn-danger">−</a> <span class="mx-2"
										th:text="${c.quantity}"></span>

									<!-- Increase Quantity -->
									<a
										th:href="@{/cart/inc(pid=${c.product.id}, uid=${c.user.id})}"
										class="btn btn-sm btn-success">+</a>
								</div>
							</td>

							<td>₹<span th:text="${c.totalPrice}"></span></td>

							<!-- Remove Item -->
							<td><a th:href="@{/cart/remove(cid=${c.id},uid=${uid})}"
								class="btn btn-danger btn-sm">Remove</a></td>
						</tr>
					</tbody>
				</table>
			</div>

			<!-- BILL SUMMARY -->
			<div class="col-md-4">
				<div class="card shadow">
					<div class="card-header bg-success text-white">
						<h5 class="mb-0">Bill Summary</h5>
					</div>

					<div class="card-body">

						<p class="d-flex justify-content-between">
							<span><strong>Total Items:</strong></span> <span
								th:text="${totalcount}"></span>
						</p>

						<p class="d-flex justify-content-between">
							<span><strong>Total Amount:</strong></span> <span>₹ <span
								th:text="${total}"></span></span>
						</p>

						<hr>

						<a th:href="@{/ordersummery(uid=${uid})}"class="btn btn-success w-100 btn-lg">
							Place Order </a>
					</div>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
<script>
document.addEventListener("DOMContentLoaded", function () {
    setTimeout(() => {
        const msgBox = document.getElementById("msg-box");
        if (msgBox) {
            msgBox.style.transition = "opacity 0.8s";
            msgBox.style.opacity = "0";
            setTimeout(() => msgBox.style.display = "none", 800);
        }
    }, 3000);
});
</script>
